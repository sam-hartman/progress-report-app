app = "qpr-backend"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8000"
  DEBUG = "false"
  MAX_IMAGE_SIZE_MB = "10"
  UPLOAD_DIR = "/app/uploads"
  TEMP_DIR = "/app/temp"
  IMAGE_RETENTION_HOURS = "24"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    port = 8000
    type = "http"
    interval = "15s"
    timeout = "5s"
    path = "/api/health"

[mounts]
  source = "qpr_uploads"
  destination = "/app/uploads"
